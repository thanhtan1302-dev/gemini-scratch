<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Giáo Viên Lớp 1</title>
    <style>
        body {
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #eef2f3;
        }
        /* Kích thước chuẩn 480x360 */
        .app-container {
            width: 480px; height: 360px;
            background: #fff; border: 4px solid #FF9800;
            border-radius: 15px; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .header {
            background: #FF9800; color: white; padding: 10px;
            text-align: center; font-weight: bold; font-size: 18px;
        }
        #chat-box {
            flex: 1; padding: 10px; overflow-y: auto;
            background: #fff9f0; font-size: 14px;
        }
        .msg { margin-bottom: 8px; padding: 8px; border-radius: 10px; line-height: 1.4; }
        .teacher { background: #E1F5FE; border-left: 4px solid #03A9F4; align-self: flex-start; }
        .student { background: #DCEDC8; align-self: flex-end; text-align: right; }
        
        .nav-buttons {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 5px; padding: 5px; background: #eee;
        }
        button {
            border: none; border-radius: 5px; padding: 8px;
            color: white; font-weight: bold; cursor: pointer; font-size: 12px;
        }
        .btn-toan { background: #f44336; }
        .btn-tv { background: #2196F3; }
        .btn-stem { background: #4CAF50; }
        
        .input-group { display: flex; padding: 5px; border-top: 1px solid #ccc; }
        input { flex: 1; border: 1px solid #ddd; border-radius: 4px; padding: 5px; outline: none; }
        #exit-btn {
            background: #607D8B; padding: 5px 10px; font-size: 10px;
            position: absolute; top: 10px; right: 10px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <button id="exit-btn" onclick="exitApp()">THOÁT</button>
    <div class="header">Cô Giáo Lớp 1 👩‍🏫</div>
    
    <div id="chat-box">
        <div class="msg teacher">Chào em! Hôm nay chúng ta sẽ cùng học Toán, Tiếng Việt và STEM từ kho kiến thức internet nhé!</div>
    </div>

    <div class="nav-buttons">
        <button class="btn-toan" onclick="loadContent('toan')">🔢 TOÁN</button>
        <button class="btn-tv" onclick="loadContent('tieng-viet')">📖 TIẾNG VIỆT</button>
        <button class="btn-stem" onclick="loadContent('stem')">🌱 STEM</button>
    </div>

    <div class="input-group">
        <input type="text" id="userInput" placeholder="Câu trả lời của em...">
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const synth = window.speechSynthesis;

    // Giả lập lấy dữ liệu từ URL internet (ví dụ GitHub Gist hoặc API)
    // Trong thực tế bạn thay URL này bằng link chứa file JSON của bạn
    const DATA_URL = "https://raw.githubusercontent.com/learn-api/data/main/grade1.json";

    async function loadContent(subject) {
        addMessage("Đang tải bài học từ internet... 🌐", "teacher", false);
        
        try {
            // Demo: Thực tế sẽ dùng fetch(DATA_URL)
            // Ở đây tôi mô phỏng dữ liệu trả về từ internet
            const response = await simulateFetch(subject);
            addMessage(response, "teacher", true);
        } catch (error) {
            addMessage("Ôi, mạng bị lỗi rồi! Thử lại sau em nhé.", "teacher", true);
        }
    }

    // Hàm mô phỏng việc fetch dữ liệu từ Internet
    function simulateFetch(subject) {
        return new Promise((resolve) => {
            const mockData = {
                'toan': "Theo kiến thức mới: Em hãy thực hiện phép tính 10 - 4 bằng bao nhiêu?",
                'tieng-viet': "Tìm kiếm internet: Đố em từ nào có chứa vần 'ươu' như từ 'con hươu'?",
                'stem': "Khám phá STEM: Tại sao khi ra đường chúng ta phải quan sát biển báo giao thông?"
            };
            setTimeout(() => resolve(mockData[subject]), 800);
        });
    }

    function addMessage(text, sender, shouldSpeak) {
        const div = document.createElement('div');
        div.className = `msg ${sender}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        if (shouldSpeak) speak(text);
    }

    function speak(text) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'vi-VN';
        utter.rate = 1.0;
        utter.pitch = 1.2; // Giọng Leda trẻ trung
        synth.speak(utter);
    }

    function exitApp() {
        // Lệnh đóng iframe theo yêu cầu kỹ thuật của bạn
        window.parent.postMessage('close-iframe', '*');
        alert("Đang đóng ứng dụng...");
    }

    document.getElementById('userInput').addEventListener('keypress', function(e) {
        if(e.key === 'Enter' && this.value !== "") {
            addMessage(this.value, 'student', false);
            this.value = "";
            setTimeout(() => {
                addMessage("Cô khen em! Câu trả lời rất đáng chú ý.", "teacher", true);
            }, 1000);
        }
    });
</script>

</body>
</html>
