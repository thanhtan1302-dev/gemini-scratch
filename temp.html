<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Lớp 1 - NotebookLM Data</title>
    <style>
        :root {
            --primary-color: #ff7f50;
            --math-color: #4caf50;
            --viet-color: #2196f3;
            --stem-color: #9c27b0;
            --bg-color: #fdf6e3;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0;
        }

        .chat-container {
            width: 480px; height: 360px; /* Kích thước chuẩn bạn hay dùng */
            background: white; border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            display: flex; flex-direction: column;
            border: 3px solid var(--primary-color);
            position: relative; overflow: hidden;
        }

        .chat-header {
            background: var(--primary-color); color: white;
            padding: 10px; text-align: center; font-weight: bold;
            font-size: 16px;
        }

        .chat-box {
            flex: 1; padding: 15px; overflow-y: auto;
            display: flex; flex-direction: column;
            background-color: #fffaf0;
        }

        .message {
            margin-bottom: 10px; padding: 8px 12px;
            border-radius: 12px; font-size: 14px; line-height: 1.4;
            max-width: 85%; word-wrap: break-word;
        }

        .bot-msg { background: #e1ffc7; align-self: flex-start; }
        .user-msg { background: #d1e3ff; align-self: flex-end; }

        .controls {
            display: grid; grid-template-columns: 1fr 1fr 1fr;
            gap: 5px; padding: 10px; background: #eee;
        }

        button {
            border: none; border-radius: 10px; color: white;
            padding: 8px; cursor: pointer; font-weight: bold; font-size: 12px;
        }

        .btn-math { background: var(--math-color); }
        .btn-viet { background: var(--viet-color); }
        .btn-stem { background: var(--stem-color); }

        .input-area { display: flex; padding: 5px; border-top: 1px solid #ddd; }
        input { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 15px; outline: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🏫 LỚP 1: TOÁN - TIẾNG VIỆT - STEM</div>
    
    <div class="chat-box" id="chatBox">
        <div class="message bot-msg">Chào bé! Hãy chọn môn học để khám phá kiến thức từ tài liệu của chúng mình nhé! 📚</div>
    </div>

    <div class="controls">
        <button class="btn-math" onclick="getRandomQuestion('math')">🔢 TOÁN</button>
        <button class="btn-viet" onclick="getRandomQuestion('viet')">📖 TIẾNG VIỆT</button>
        <button class="btn-stem" onclick="getRandomQuestion('stem')">🌱 STEM</button>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Nhập câu trả lời...">
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const synth = window.speechSynthesis;

    // --- PHẦN DỮ LIỆU TỪ NOTEBOOKLM ---
    // Bạn hãy dán nội dung trích xuất được từ NotebookLM vào các mảng dưới đây
    const notebookData = {
        math: [
            "NotebookLM nói: Phép cộng trong phạm vi 10. Đố bé 4 + 3 bằng mấy?",
            "Câu hỏi Toán từ tài liệu: Bé hãy đếm xem có bao nhiêu hình tròn trong hình vuông nhé!",
            "Thử thách: Số nào lớn hơn trong hai số 8 và 5?"
        ],
        viet: [
            "Tài liệu Tiếng Việt: Bé hãy tìm chữ cái đứng đầu trong từ 'Cá chép'?",
            "NotebookLM nhắc: Vần 'an' có trong từ nào sau đây: cái bàn hay con mèo?",
            "Bé hãy đọc to câu này: 'Bé đi học về' nhé!"
        ],
        stem: [
            "Kiến thức STEM: Tại sao chúng ta cần tưới nước cho cây mỗi ngày nhỉ?",
            "Dự án nhỏ: Để làm một chiếc thuyền buồm, bé cần những nguyên liệu gì từ đồ tái chế?",
            "Quan sát: Đèn giao thông màu đỏ thì chúng mình phải làm gì?"
        ]
    };

    function speak(text) {
        synth.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'vi-VN';
        utter.rate = 0.9;
        utter.pitch = 1.1;
        synth.speak(utter);
    }

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}-msg`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        if (type === 'bot') speak(text);
    }

    // Lấy câu hỏi ngẫu nhiên từ kho dữ liệu NotebookLM
    function getRandomQuestion(subject) {
        const questions = notebookData[subject];
        const randomIndex = Math.floor(Math.random() * questions.length);
        addMessage(questions[randomIndex], 'bot');
    }

    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && this.value.trim() !== "") {
            addMessage(this.value, 'user');
            setTimeout(() => {
                addMessage("Bé giỏi quá! Tài liệu NotebookLM ghi nhận câu trả lời của bé rồi đấy! 🎉", "bot");
            }, 1000);
            this.value = "";
        }
    });
</script>

</body>
</html>
