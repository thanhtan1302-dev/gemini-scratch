<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Học Tập Cánh Diều</title>
    <style>
        /* Định dạng giao diện theo phong cách trẻ em (480x360px) */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f8ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #app-container {
            width: 480px;
            height: 360px;
            background-color: #ffffff;
            border: 4px solid #ffcc00;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #header {
            background-color: #ffcc00;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            color: #d35400;
            font-size: 18px;
        }

        #chat-content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-image: radial-gradient(#fff9c4 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot-msg {
            background-color: #e3f2fd;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            color: #1565c0;
        }

        .user-msg {
            background-color: #f1f8e9;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
            color: #2e7d32;
        }

        #input-area {
            display: flex;
            padding: 10px;
            border-top: 2px solid #eee;
        }

        input {
            flex: 1;
            padding: 8px;
            border: 2px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        button {
            margin-left: 5px;
            padding: 8px 15px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
        }

        #exit-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: #ff5252;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            font-size: 12px;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

<div id="app-container">
    <button id="exit-btn" onclick="closeApp()">X</button>
    <div id="header">🍎 Cô Giáo Cánh Diều 📚</div>
    <div id="chat-content">
        <div class="message bot-msg">Chào con! Cô là giáo viên hướng dẫn. Con muốn học Toán hay Tiếng Việt hôm nay nào? 😊</div>
    </div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Hỏi cô điều gì đó...">
        <button onclick="sendMessage()">Gửi</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAkgPyk5j_CjaBMCaYyX95SKVt9WpdyeBo"; // API Key đã được cung cấp
    const chatContent = document.getElementById('chat-content');
    const userInput = document.getElementById('user-input');

    // Cấu hình TTS Leda
    async function playTTS(text) {
        console.log("Đang đọc nội dung bằng giọng Leda: " + text);
        // Tích hợp hàm gọi TTS (Gemini TTS) ở đây
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Hiển thị tin nhắn người dùng
        appendMessage(text, 'user-msg');
        userInput.value = '';

        // Giả lập xử lý dữ liệu từ sách Cánh Diều
        let response = "";
        if (text.toLowerCase().includes("toán")) {
            response = "Trong sách Toán 1 Cánh Diều, chúng mình sẽ học về các số trong phạm vi 10, các hình khối và phép cộng trừ đơn giản đấy!";
        } else if (text.toLowerCase().includes("tiếng việt")) {
            response = "Sách Tiếng Việt 1 sẽ giúp con làm quen với các âm, vần và những bài đọc thật hay về gia đình, nhà trường.";
        } else {
            response = "Con có thể hỏi cô về các bài học trong sách giáo khoa lớp 1 nhé!";
        }

        // Hiển thị phản hồi của giáo viên
        setTimeout(() => {
            appendMessage(response, 'bot-msg');
            playTTS(response);
        }, 500);
    }

    function appendMessage(text, className) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        chatContent.appendChild(msgDiv);
        chatContent.scrollTop = chatContent.scrollHeight;
    }

    function closeApp() {
        // Lệnh đóng iframe theo yêu cầu kỹ thuật
        window.parent.postMessage('close-iframe', '*');
    }

    // Gửi tin nhắn bằng phím Enter
    userInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
