<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voi Con Thông Thái - Học Lớp 1</title>
    <style>
        :root {
            --primary-color: #ff7f50;
            --math-color: #4caf50;
            --viet-color: #2196f3;
            --stem-color: #9c27b0;
            --bg-color: #f0f9ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 85vh;
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 5px solid var(--primary-color);
        }

        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png');
            display: flex;
            flex-direction: column;
        }

        .message {
            margin-bottom: 15px;
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            line-height: 1.6;
            font-size: 1.1rem;
            position: relative;
        }

        .bot-msg {
            background: #e1ffc7;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        .user-msg {
            background: #d1e3ff;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .controls {
            padding: 15px;
            background: #f9f9f9;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            border-top: 2px dashed #ff7f50;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        button:hover { opacity: 0.9; transform: translateY(-2px); }
        button:active { transform: scale(0.95); }

        .btn-math { background: var(--math-color); }
        .btn-viet { background: var(--viet-color); }
        .btn-stem { background: var(--stem-color); }

        .input-area {
            display: flex;
            padding: 15px;
            background: white;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            border-radius: 30px;
            outline: none;
            font-size: 1rem;
        }
        
        /* Hiệu ứng loa đang nói */
        .speaking {
            border: 2px solid #ffeb3b;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 235, 59, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 235, 59, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 235, 59, 0); }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <span>🐘</span> Voi Con Thông Thái
    </div>
    
    <div class="chat-box" id="chatBox">
        <div class="message bot-msg">Chào bạn nhỏ! Tớ là Voi Con. Hôm nay chúng mình sẽ học gì nào? Hãy nhấn vào các nút màu sắc nhé! 🔊</div>
    </div>

    <div class="controls">
        <button class="btn-math" onclick="ask('math')">🔢 Toán</button>
        <button class="btn-viet" onclick="ask('viet')">📖 Tiếng Việt</button>
        <button class="btn-stem" onclick="ask('stem')">🌱 STEM</button>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Bé nhập câu trả lời vào đây...">
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');
    const synth = window.speechSynthesis;

    const data = {
        math: "Câu đố Toán học: Tớ có 3 quả cam, mẹ cho tớ thêm 2 quả nữa. Đố bạn tớ có tất cả mấy quả cam nào?",
        viet: "Câu đố Tiếng Việt: Bạn hãy tìm một từ có chứa vần 'ao'. Ví dụ như là: 'ngôi sao'. Bạn còn biết từ nào nữa không?",
        stem: "Khám phá Khoa học: Bạn có biết tại sao con vịt lại nổi được trên mặt nước không? Đó là nhờ bộ lông của các bạn ấy có một lớp dầu đặc biệt đấy!"
    };

    // Hàm đọc văn bản
    function speak(text) {
        // Hủy các yêu cầu đọc đang dở dang
        synth.cancel();
        
        const utterThis = new SpeechSynthesisUtterance(text);
        utterThis.lang = 'vi-VN'; // Thiết lập tiếng Việt
        utterThis.rate = 0.9;      // Tốc độ đọc (0.9 là hơi chậm, phù hợp cho bé)
        utterThis.pitch = 1.2;     // Độ cao giọng (1.2 cho giọng trẻ trung, dễ thương)
        
        synth.speak(utterThis);
    }

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}-msg`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        
        // Nếu là tin nhắn của Bot thì tự động đọc
        if (type === 'bot') {
            speak(text);
        }
    }

    function ask(subject) {
        addMessage(data[subject], 'bot');
    }

    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && this.value.trim() !== "") {
            addMessage(this.value, 'user');
            
            // Phản hồi ngẫu nhiên sau khi bé trả lời
            setTimeout(() => {
                const praises = [
                    "Ồ, bạn giỏi quá! Thật là thông minh! 🌟",
                    "Đúng rồi! Bạn trả lời tuyệt vời lắm! 🎉",
                    "Hay quá! Chúng mình cùng học tiếp nhé! ❤️"
                ];
                const randomPraise = praises[Math.floor(Math.random() * praises.length)];
                addMessage(randomPraise, "bot");
            }, 1000);
            
            this.value = "";
        }
    });

    // Chào mừng khi vừa mở trang
    window.onload = () => {
        setTimeout(() => {
            speak("Chào bạn nhỏ! Tớ là Voi Con. Hôm nay chúng mình sẽ học gì nào?");
        }, 500);
    };
</script>

</body>
</html>
