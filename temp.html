<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voi Con Thông Thái - Học Lớp 1</title>
    <style>
        :root {
            --primary-color: #ff7f50;
            --math-color: #4caf50;
            --viet-color: #2196f3;
            --stem-color: #9c27b0;
            --bg-color: #f0f9ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 4px solid var(--primary-color);
        }

        .chat-header {
            background: var(--primary-color);
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-image: url('https://www.transparenttextures.com/patterns/kids-icons.png');
        }

        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 15px;
            max-width: 80%;
            line-height: 1.5;
        }

        .bot-msg {
            background: #e1ffc7;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }

        .user-msg {
            background: #d1e3ff;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
        }

        .controls {
            padding: 15px;
            background: #eee;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 8px 15px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:active { transform: scale(0.95); }

        .btn-math { background: var(--math-color); }
        .btn-viet { background: var(--viet-color); }
        .btn-stem { background: var(--stem-color); }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">🐘 Voi Con Thông Thái - Học Cùng Bé</div>
    
    <div class="chat-box" id="chatBox">
        <div class="message bot-msg">Chào bạn nhỏ! Tớ là Voi Con. Hôm nay chúng mình sẽ học gì nào? Hãy chọn một môn nhé! 👇</div>
    </div>

    <div class="controls">
        <button class="btn-math" onclick="ask('math')">🔢 Toán Học</button>
        <button class="btn-viet" onclick="ask('viet')">📖 Tiếng Việt</button>
        <button class="btn-stem" onclick="ask('stem')">🌱 STEM</button>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Nhập câu trả lời của bé...">
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');

    const data = {
        math: "Câu đố Toán: Tớ có 3 viên kẹo, mẹ cho thêm 2 viên nữa. Đố bạn tớ có tất cả mấy viên kẹo? 🍬",
        viet: "Câu đố Tiếng Việt: Bạn hãy tìm một từ có vần 'ao' (ví dụ: con cháo). Bạn tìm được từ nào khác không? 🎈",
        stem: "Khám phá STEM: Bạn có biết tại sao con vịt lại nổi được trên mặt nước không? Hãy quan sát bộ lông của bạn ấy nhé! 🦆"
    };

    function addMessage(text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${type}-msg`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function ask(subject) {
        addMessage(data[subject], 'bot');
    }

    document.getElementById('userInput').addEventListener('keypress', function (e) {
        if (e.key === 'Enter' && this.value.trim() !== "") {
            addMessage(this.value, 'user');
            setTimeout(() => {
                addMessage("Ồ, bạn giỏi quá! Tiếp tục phát huy nhé! 🎉", "bot");
            }, 1000);
            this.value = "";
        }
    });
</script>

</body>
</html>
