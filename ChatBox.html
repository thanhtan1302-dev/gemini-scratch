<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Học Cùng Bé - Thế Giới Sắc Màu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #FFDEE9;
            background-image: linear-gradient(0deg, #FFDEE9 0%, #B5FFFC 100%);
        }

        .app-viewport { 
            width: 480px; 
            height: 360px; 
            overflow: hidden;
            position: relative;
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border: 5px solid #FF85A1;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
        }

        .chat-container { 
            flex: 1; 
            overflow-y: auto; 
            padding: 12px; 
            background: #FFF9E3;
            background-image: radial-gradient(#FFD1D1 0.5px, transparent 0.5px);
            background-size: 15px 15px;
        }

        .header-bg {
            background: #FF85A1;
            background: linear-gradient(90deg, #FF85A1 0%, #FFB7B2 100%);
        }

        .bubble-ai {
            background: white;
            border-radius: 15px 15px 15px 4px;
            border: 2px solid #FFB7B2;
            position: relative;
        }

        .bubble-user {
            background: #4facfe;
            background-image: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-radius: 15px 15px 4px 15px;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #FFB7B2;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .dot {
            width: 5px;
            height: 5px;
            background: #FF85A1;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .suggestions-container {
            padding: 6px 10px;
            display: flex;
            gap: 6px;
            overflow-x: auto;
            background: white;
            white-space: nowrap;
            scrollbar-width: none;
            border-top: 1px solid #fce7f3;
        }
        .suggestions-container::-webkit-scrollbar { display: none; }
        
        .suggestion-chip {
            background: #fff1f2;
            color: #e11d48;
            border: 1px solid #fecdd3;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-chip:hover {
            background: #ffe4e6;
            transform: scale(1.05);
        }

        .mic-active {
            animation: pulse-red 1s infinite;
            background-color: #ef4444 !important;
            color: white !important;
        }

        .exit-btn {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 800;
            color: white;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .exit-btn:hover {
            background: #ef4444;
            border-color: #ef4444;
            transform: scale(1.05);
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div class="app-viewport">
        <!-- Header -->
        <nav class="p-2 header-bg flex justify-between items-center z-50 shadow-sm">
            <div class="w-16"></div>
            <h1 class="text-white font-extrabold text-base flex items-center gap-2">
                <span>🚀</span> KHÁM PHÁ
            </h1>
            <button onclick="closeApp()" class="exit-btn">THOÁT</button>
        </nav>

        <!-- Chat Area -->
        <div id="chat-messages" class="chat-container space-y-3">
            <div class="flex items-end gap-2">
                <div class="avatar shadow-sm">👩‍🏫</div>
                <div class="bubble-ai p-2 shadow-sm max-w-[85%] text-xs">
                    Chào con yêu! 🌈 Cô giáo rất vui được gặp con. Hôm nay con muốn học gì cùng cô nào? 🍎🍓
                </div>
            </div>
        </div>

        <!-- Gợi ý nhanh -->
        <div id="suggestions-bar" class="suggestions-container"></div>

        <!-- Input Area -->
        <div class="p-2 bg-white border-t-2 border-pink-100">
            <div class="flex gap-2 items-center">
                <button id="mic-btn" class="w-8 h-8 rounded-full bg-pink-100 text-pink-500 flex items-center justify-center transition-all hover:bg-pink-200 focus:outline-none">
                    <i class="fas fa-microphone text-xs"></i>
                </button>

                <input type="text" id="user-input" placeholder="Nói với Cô nhé..." 
                    class="flex-1 p-2 text-xs border-2 border-pink-200 rounded-xl focus:outline-none focus:border-pink-400 bg-pink-50/30">
                
                <button id="send-btn" onclick="handleSend()" class="bg-pink-500 text-white w-8 h-8 rounded-full hover:bg-pink-600 shadow-md transition flex items-center justify-center">
                    <i class="fas fa-paper-plane text-xs"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const _p1 = "AIzaSyD8t";
        const _p2 = "dberxxkY_9WKuqP";
        const _p3 = "qqZLYqw9_r5o07Q";
        const getK = () => apiKey || (_p1 + _p2 + _p3);

        const messagesContainer = document.getElementById('chat-messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const suggestionsBar = document.getElementById('suggestions-bar');

        const initialSuggestions = ["Toán lớp 1", "Kể chuyện", "Học vần", "Khen bé"];

        function closeApp() {
            window.parent.postMessage("close iframe", "*");
            console.log("Thoát ứng dụng: close iframe");
        }

        function updateSuggestions(options) {
            suggestionsBar.innerHTML = '';
            options.forEach(text => {
                const chip = document.createElement('div');
                chip.className = 'suggestion-chip';
                chip.innerText = text;
                chip.onclick = () => {
                    userInput.value = text;
                    handleSend();
                };
                suggestionsBar.appendChild(chip);
            });
        }

        updateSuggestions(initialSuggestions);

        let recognition;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'vi-VN';
            recognition.onstart = () => micBtn.classList.add('mic-active');
            recognition.onresult = (event) => {
                userInput.value = event.results[0][0].transcript;
                handleSend();
            };
            recognition.onend = () => micBtn.classList.remove('mic-active');
            micBtn.addEventListener('click', () => { try { recognition.start(); } catch (e) { recognition.stop(); } });
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            addMessage(text, 'user');
            userInput.value = '';
            sendBtn.disabled = true;

            const typingDiv = document.createElement('div');
            typingDiv.id = 'typing-indicator';
            typingDiv.className = 'flex items-end gap-2 mb-3';
            typingDiv.innerHTML = `<div class="avatar">👩‍🏫</div><div class="bubble-ai p-2 shadow-sm flex gap-1"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            try {
                const result = await callGeminiWithSuggestions(text);
                if (document.getElementById('typing-indicator')) document.getElementById('typing-indicator').remove();
                
                addMessage(result.answer, 'ai');
                if (result.suggestions) updateSuggestions(result.suggestions);
            } catch (error) {
                if (document.getElementById('typing-indicator')) document.getElementById('typing-indicator').remove();
                addMessage("Cô bận xíu, bé đợi nhé! 🧸", 'ai');
            } finally {
                sendBtn.disabled = false;
            }
        }

        async function callGeminiWithSuggestions(prompt) {
            const systemPrompt = `Bạn là cô giáo lớp 1. Trả lời ngọt ngào (< 30 từ). Gợi ý 3 câu ngắn tiếp theo. PHẢN HỒI JSON: {"answer": "...", "suggestions": ["...", "...", "..."]}`;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${getK()}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] },
                    generationConfig: { responseMimeType: "application/json" }
                })
            });
            const data = await res.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} mb-3 items-end gap-2`;
            if (sender === 'ai') {
                div.innerHTML = `
                    <div class="avatar shadow-sm">👩‍🏫</div>
                    <div class="bubble-ai p-2 shadow-sm max-w-[85%] text-xs">
                        ${text}
                    </div>`;
            } else {
                div.innerHTML = `<div class="bubble-user p-2 shadow-sm max-w-[80%] text-xs font-medium">${text}</div>`;
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return div;
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
