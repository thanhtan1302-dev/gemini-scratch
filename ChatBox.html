<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Cùng Giáo Viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        
        body { 
            font-family: 'Lexend', sans-serif; 
            background-color: #fdf2f8; /* pink-50 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            height: 360px;
            background: white;
            border: 6px solid #f472b6; /* pink-400 */
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
        }

        .chat-display {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background-color: #fffdf5;
            background-image: radial-gradient(#ffd1d1 0.6px, transparent 0.6px);
            background-size: 20px 20px;
        }

        .bubble-ai {
            background: white;
            border: 2px solid #fdf2f8;
            border-radius: 16px 16px 16px 0;
            color: #334155;
        }

        .bubble-user {
            background: linear-gradient(to bottom right, #6366f1, #3b82f6);
            color: white;
            border-radius: 16px 16px 0 16px;
        }

        .speaker-btn {
            color: #f472b6;
            cursor: pointer;
            transition: all 0.2s;
        }
        .speaker-btn:hover { color: #db2777; transform: scale(1.1); }
        .speaker-active { color: #ec4899; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Tùy chỉnh thanh cuộn */
        .chat-display::-webkit-scrollbar { width: 4px; }
        .chat-display::-webkit-scrollbar-thumb { background: #fbcfe8; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Header -->
        <header class="bg-gradient-to-r from-pink-400 to-pink-300 p-4 flex justify-between items-center shadow-sm shrink-0">
            <div class="w-10"></div>
            <h1 class="text-white font-extrabold text-lg tracking-tight uppercase drop-shadow-sm">CHAT CÙNG GIÁO VIÊN</h1>
            <button onclick="window.parent.postMessage('close iframe', '*')" class="bg-white/30 text-[10px] px-2.5 py-1.5 rounded-full text-white font-bold border border-white/50 hover:bg-white/40 active:scale-95 transition-all">THOÁT</button>
        </header>

        <!-- Chat Area -->
        <div id="chat-box" class="chat-display space-y-5">
            <!-- Tin nhắn mẫu ban đầu -->
            <div class="flex items-end gap-2.5">
                <div class="w-9 h-9 rounded-full bg-pink-100 border-2 border-white flex items-center justify-center text-xl shadow-sm shrink-0">👩‍🏫</div>
                <div class="p-3.5 bubble-ai max-w-[85%] text-[14px] leading-relaxed shadow-sm relative group">
                    <span id="welcome-text">Chào con yêu! 🌈 Cô giáo đã sẵn sàng giúp con học Toán, Tiếng Việt và làm STEM từ bộ sách Cánh Diều. Con muốn hỏi gì cô nào?</span>
                    <button onclick="speakTextFromButton(this)" class="absolute -right-9 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-pink-400 hover:text-pink-600 transition-colors">
                        <i class="fas fa-volume-up"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-white border-t-2 border-pink-50 shrink-0">
            <div class="flex gap-4 items-center">
                <!-- Nút Micro -->
                <div class="relative flex flex-col items-center justify-center">
                    <button id="mic-btn" onclick="toggleMic()" class="text-2xl text-pink-500 hover:text-pink-600 transition-all active:scale-90 flex flex-col items-center">
                        <i class="fas fa-microphone" id="mic-icon"></i>
                        <span class="text-[8px] font-bold mt-1 uppercase tracking-tighter">Nói</span>
                    </button>
                </div>
                
                <div class="flex-1 relative">
                    <input type="text" id="user-input" placeholder="Nhập chữ ở đây..." 
                        class="w-full p-3 text-sm border-2 border-pink-100 rounded-2xl focus:outline-none focus:border-pink-300 bg-pink-50/20 placeholder-slate-300 shadow-inner">
                </div>

                <!-- Nút Gửi (Tam giác xanh) -->
                <button id="send-btn" onclick="handleSend()" class="text-green-500 hover:text-green-600 w-10 h-10 flex items-center justify-center transition-all active:scale-90">
                    <i class="fas fa-play text-2xl"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        const _p = ["AIzaSyBoC", "EROf4LrBPnBO06-", "RsRGAYNEoiwbxEs"];
        const getK = () => apiKey || _p.join('');

        const MODEL_TEXT = "gemini-2.5-flash";
        const MODEL_TTS = "gemini-2.5-flash-preview-tts";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const micIcon = document.getElementById('mic-icon');
        const micBtn = document.getElementById('mic-btn');

        let isTyping = false;
        let recognition;

        // Setup Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'vi-VN';
            recognition.onstart = () => { micIcon.classList.add('text-red-500', 'animate-pulse', 'scale-125'); };
            recognition.onend = () => { micIcon.classList.remove('text-red-500', 'animate-pulse', 'scale-125'); };
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                handleSend();
            };
        }

        function toggleMic() {
            if (!recognition) return;
            try { recognition.start(); } catch (e) { recognition.stop(); }
        }

        async function callGemini(prompt) {
            const systemPrompt = "Bạn là cô giáo lớp 1 thân thiện. Trả lời về STEM, Toán, Tiếng Việt Cánh Diều. Ngọt ngào, ngắn gọn (< 40 từ). Tránh ký tự lạ.";
            let retries = 0;
            while (retries < 3) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TEXT}:generateContent?key=${getK()}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    const data = await res.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (e) {
                    retries++;
                    await new Promise(r => setTimeout(r, 1000 * retries));
                }
            }
            throw new Error("API Fail");
        }

        async function speakText(text, btnElement = null) {
            if (btnElement) btnElement.classList.add('speaker-active');
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TTS}:generateContent?key=${getK()}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Đọc giọng cô giáo vui vẻ: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
                        }
                    })
                });
                const data = await res.json();
                const audioBase64 = data.candidates[0].content.parts.find(p => p.inlineData).inlineData.data;
                const audioBlob = pcmToWav(audioBase64, 24000);
                const audio = new Audio(URL.createObjectURL(audioBlob));
                audio.onended = () => { if (btnElement) btnElement.classList.remove('speaker-active'); };
                audio.play();
            } catch (e) {
                console.error(e);
                if (btnElement) btnElement.classList.remove('speaker-active');
            }
        }

        function pcmToWav(base64Pcm, sampleRate) {
            const buffer = Uint8Array.from(atob(base64Pcm), c => c.charCodeAt(0)).buffer;
            const wavHeader = new ArrayBuffer(44);
            const view = new DataView(wavHeader);
            const writeString = (o, s) => { for (let i = 0; i < s.length; i++) view.setUint8(o + i, s.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + buffer.byteLength, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, buffer.byteLength, true);
            return new Blob([wavHeader, buffer], { type: 'audio/wav' });
        }

        function addMessage(text, role) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} items-end gap-2.5`;
            
            if (role === 'ai') {
                wrapper.innerHTML = `
                    <div class="w-9 h-9 rounded-full bg-pink-100 border-2 border-white flex items-center justify-center text-xl shadow-sm shrink-0">👩‍🏫</div>
                    <div class="p-3.5 bubble-ai max-w-[85%] text-[14px] leading-relaxed shadow-sm relative group">
                        <span>${text}</span>
                        <button onclick="speakTextFromButton(this)" class="absolute -right-9 top-1/2 -translate-y-1/2 w-8 h-8 flex items-center justify-center text-pink-400 hover:text-pink-600 transition-colors">
                            <i class="fas fa-volume-up"></i>
                        </button>
                    </div>
                `;
            } else {
                wrapper.innerHTML = `
                    <div class="p-3.5 bubble-user max-w-[85%] text-[14px] leading-relaxed shadow-sm">
                        ${text}
                    </div>
                `;
            }
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function speakTextFromButton(btn) {
            const text = btn.parentElement.querySelector('span').innerText;
            speakText(text, btn.querySelector('i'));
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || isTyping) return;

            addMessage(text, 'user');
            userInput.value = '';
            isTyping = true;

            const loading = document.createElement('div');
            loading.className = 'flex items-end gap-2.5';
            loading.id = 'typing';
            loading.innerHTML = `
                <div class="w-9 h-9 rounded-full bg-pink-100 flex items-center justify-center text-xl shadow-sm">👩‍🏫</div>
                <div class="bg-white border-2 border-pink-50 p-4 rounded-2xl rounded-bl-none flex gap-2 shadow-sm italic text-xs text-pink-400 items-center">
                    <i class="fas fa-microphone animate-bounce text-[10px]"></i>
                    <i class="fas fa-microphone animate-bounce delay-75 text-[10px]"></i>
                    <i class="fas fa-microphone animate-bounce delay-150 text-[10px]"></i>
                </div>
            `;
            chatBox.appendChild(loading);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const answer = await callGemini(text);
                document.getElementById('typing').remove();
                addMessage(answer, 'ai');
                speakText(answer); // Tự động đọc
            } catch (e) {
                if (document.getElementById('typing')) document.getElementById('typing').remove();
                addMessage("Cô bận xíu, bé thử lại nhé! 🧸", 'ai');
            } finally {
                isTyping = false;
            }
        }

        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
